# Common keyboard shortcuts and icon patterns for all applications.
# This is part of the OpenClaw ACI knowledge base — community shareable.

shortcuts:
  # Universal shortcuts (Windows)
  ctrl+c: copy
  ctrl+x: cut
  ctrl+v: paste
  ctrl+z: undo
  ctrl+y: redo
  ctrl+s: save
  ctrl+a: select_all
  ctrl+f: find
  ctrl+p: print
  ctrl+n: new
  ctrl+o: open
  ctrl+w: close_tab
  ctrl+t: new_tab
  ctrl+shift+t: reopen_closed_tab
  ctrl+tab: next_tab
  ctrl+shift+tab: previous_tab
  alt+f4: close_window
  alt+tab: switch_window
  f1: help
  f2: rename
  f5: refresh
  f11: fullscreen
  escape: cancel
  enter: confirm
  delete: delete
  home: go_to_start
  end: go_to_end

  # Chinese input shortcuts
  ctrl+space: toggle_ime
  ctrl+shift: switch_ime

